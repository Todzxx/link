<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rahasia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-attachment: fixed;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(255, 107, 107, 0.12), transparent 70%);
      top: -150px;
      left: -150px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(78, 205, 196, 0.08), transparent 70%);
      bottom: -200px;
      right: -200px;
      border-radius: 50%;
      pointer-events: none;
    }
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .img-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 20px;
      animation: float 4s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .page-img {
      display: block;
      width: 200px;
      height: 200px;
      object-fit: cover;
      border-radius: 12px;
      border: 3px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }
    .title {
      color: #fff;
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 4px;
      letter-spacing: 1px;
    }
    .subtitle {
      color: rgba(255,255,255,0.4);
      font-size: 0.85rem;
      font-weight: 300;
      margin-bottom: 36px;
    }
    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      color: #fff;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
    }
    .btn-back:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.12);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .btn-back svg {
      width: 18px;
      height: 18px;
    }
    @media (max-width: 480px) {
      .page-img { width: 170px; height: 170px; }
      .title { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>

  <div class="container">
    <div class="img-wrapper">
      <img class="page-img" id="pageImage" src="monkey.jpeg" alt="">
    </div>
    <div class="title" id="pageTitle">fuck you</div>
    <a class="btn-back" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5"/><polyline points="12 19 5 12 12 5"/></svg>
      Kembali
    </a>
  </div>

  <script>
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (3 + Math.random() * 4) + 's');
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
      starsContainer.appendChild(star);
    }

    const params = new URLSearchParams(window.location.search);
    const type = params.get('type');
    const img = document.getElementById('pageImage');
    const title = document.getElementById('pageTitle');
    const subtitle = document.getElementById('pageSubtitle');

    if (type === 'youtube') {
      img.src = 'youtube.jpeg';
      title.textContent = 'belum ada';
    } else if (type === 'tiktok') {
      img.src = 'tiktok.jpeg';
      title.textContent = 'mana nyak';
    }
  </script>
</body>
</html>
