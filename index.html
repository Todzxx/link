<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toxd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      background-attachment: fixed;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, rgba(255, 107, 107, 0.15), transparent 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      width: 500px;
      height: 500px;
      background: radial-gradient(circle, rgba(78, 205, 196, 0.12), transparent 70%);
      bottom: -150px;
      left: -150px;
      border-radius: 50%;
      pointer-events: none;
    }
    .stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: #fff;
      border-radius: 50%;
      animation: twinkle var(--duration) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.5); }
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }
    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      object-fit: cover;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      margin-bottom: 20px;
      animation: float 6s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
    .name {
      color: #fff;
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .bio {
      color: rgba(255,255,255,0.6);
      font-size: 0.9rem;
      font-weight: 300;
      margin-bottom: 30px;
      line-height: 1.5;
    }
    .links { display: flex; flex-direction: column; gap: 14px; }
    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px 24px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      color: #fff;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .link::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gradient));
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 16px;
    }
    .link:hover::before { opacity: 1; }
    .link:hover {
      transform: translateY(-3px) scale(1.02);
      border-color: transparent;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .link span, .link svg { position: relative; z-index: 1; }
    .link svg { width: 22px; height: 22px; flex-shrink: 0; }
    .link:nth-child(1)::before { --gradient: #f093fb, #f5576c; }
    .link:nth-child(2)::before { --gradient: #00f2fe, #4facfe; }
    .link:nth-child(3)::before { --gradient: #ff6b6b, #ee5a24; }
    .link:nth-child(4)::before { --gradient: #38ef7d, #11998e; }
    .link:nth-child(5)::before { --gradient: #a18cd1, #fbc2eb; }
    .link:nth-child(6)::before { --gradient: #43e97b, #38f9d7; }
    .footer {
      margin-top: 40px;
      color: rgba(255,255,255,0.25);
      font-size: 0.75rem;
      font-weight: 300;
    }
    .footer a {
      color: rgba(255,255,255,0.4);
      text-decoration: none;
      transition: color 0.3s;
    }
    .footer a:hover { color: rgba(255,255,255,0.7); }
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 30px;
      cursor: zoom-out;
    }
    .modal.show {
      opacity: 1;
      pointer-events: all;
    }
    .close-btn {
      position: fixed;
      top: 24px;
      right: 24px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }
    .close-btn:hover { background: rgba(255,255,255,0.15); }
    .modal img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      transform: scale(0.9);
      transition: transform 0.3s ease;
    }
    .modal.show img {
      transform: scale(1);
    }
    @media (max-width: 480px) {
      .avatar { width: 100px; height: 100px; }
      .name { font-size: 1.3rem; }
    }
  </style>
</head>

  </div>

  <div class="modal" id="avatarModal">
    <button class="close-btn" id="closeModal">&times;</button>
    <img id="modalImg" src="" alt="">
  </div>

  <script>
    document.querySelector('.avatar').addEventListener('click', function() {
      document.getElementById('modalImg').src = this.src;
      document.getElementById('avatarModal').classList.add('show');
    });
    document.getElementById('avatarModal').addEventListener('click', function(e) {
      if (e.target === this || e.target === document.getElementById('closeModal')) {
        this.classList.remove('show');
      }
    });

    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 120; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.setProperty('--duration', (3 + Math.random() * 4) + 's');
      star.style.animationDelay = Math.random() * 5 + 's';
      star.style.width = star.style.height = (1 + Math.random() * 2) + 'px';
      starsContainer.appendChild(star);
    }
  </script>
