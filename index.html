<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>toxd</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #06060e;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.04) 0%, transparent 50%),
        radial-gradient(circle at 80% 70%, rgba(255, 0, 128, 0.04) 0%, transparent 50%);
      pointer-events: none;
    }
    .grid {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.03;
      background-image:
        linear-gradient(rgba(0, 255, 255, 0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 255, 0.3) 1px, transparent 1px);
      background-size: 60px 60px;
    }
    .glow-spot {
      position: fixed;
      pointer-events: none;
      border-radius: 50%;
      filter: blur(80px);
    }
    .glow-spot-1 {
      width: 250px; height: 250px;
      background: rgba(0, 255, 255, 0.06);
      top: -80px; right: -80px;
    }
    .glow-spot-2 {
      width: 300px; height: 300px;
      background: rgba(255, 0, 128, 0.05);
      bottom: -100px; left: -100px;
    }
    .glow-spot-3 {
      width: 200px; height: 200px;
      background: rgba(255, 200, 0, 0.03);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }
    .line {
      position: fixed;
      pointer-events: none;
      opacity: 0.05;
    }
    .line-h {
      top: 50%; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.5), transparent);
    }
    .line-v {
      left: 50%; top: 0; bottom: 0;
      width: 1px;
      background: linear-gradient(180deg, transparent, rgba(255, 0, 128, 0.5), transparent);
    }
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .avatar-wrapper {
      position: relative;
      display: inline-block;
      margin-bottom: 24px;
    }
    .avatar-glow {
      position: absolute;
      inset: -12px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(0, 255, 255, 0.15), rgba(255, 0, 128, 0.15));
      filter: blur(15px);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }
    .avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      position: relative;
      border: 2px solid rgba(0, 255, 255, 0.15);
      box-shadow:
        0 0 20px rgba(0, 255, 255, 0.05),
        inset 0 0 20px rgba(255, 0, 128, 0.05);
    }
    .name {
      font-family: 'Inter', sans-serif;
      font-weight: 900;
      font-size: 2.4rem;
      color: #fff;
      letter-spacing: -1px;
      margin-bottom: 2px;
      text-shadow:
        0 0 20px rgba(0, 255, 255, 0.2),
        0 0 60px rgba(0, 255, 255, 0.05);
    }
    .handle {
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.1);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .links { display: flex; flex-direction: column; gap: 10px; }
    .link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      border-radius: 4px;
      transition: all 0.25s ease;
    }
    .link:hover {
      color: #fff;
      background: rgba(0, 0, 0, 0.3);
      border-color: var(--neon);
      box-shadow: 0 0 25px var(--glow), inset 0 0 25px var(--glow);
    }
    .link svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      opacity: 0.3;
      transition: opacity 0.25s;
    }
    .link:hover svg { opacity: 0.8; }
    .link:nth-child(1) { --neon: rgba(255, 0, 128, 0.4); --glow: rgba(255, 0, 128, 0.08); }
    .link:nth-child(2) { --neon: rgba(0, 255, 255, 0.4); --glow: rgba(0, 255, 255, 0.08); }
    .link:nth-child(3) { --neon: rgba(255, 200, 0, 0.4); --glow: rgba(255, 200, 0, 0.08); }
    .link:nth-child(4) { --neon: rgba(0, 255, 128, 0.4); --glow: rgba(0, 255, 128, 0.08); }
    .link:nth-child(5) { --neon: rgba(180, 50, 255, 0.4); --glow: rgba(180, 50, 255, 0.08); }
    .link:nth-child(6) { --neon: rgba(29, 185, 84, 0.4); --glow: rgba(29, 185, 84, 0.08); }
    .footer {
      margin-top: 36px;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      font-size: 0.55rem;
      color: rgba(255, 255, 255, 0.05);
      letter-spacing: 6px;
      text-transform: uppercase;
    }
    @media (max-width: 480px) {
      .name { font-size: 2rem; }
      .avatar { width: 95px; height: 95px; }
      .avatar-glow { inset: -10px; }
    }
  </style>
</head>
